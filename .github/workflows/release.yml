name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Require the default branch for manual builds
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $expected = "refs/heads/${{ github.event.repository.default_branch }}"
          if ("${{ github.ref }}" -ne $expected) {
            throw "Manual release builds must run from $expected."
          }
      - name: Read package version
        id: package
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - name: Verify tag matches package version
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $expectedTag = "v${{ steps.package.outputs.version }}"
          if ("${{ github.ref_name }}" -ne $expectedTag) {
            throw "Tag ${{ github.ref_name }} does not match package version ${{ steps.package.outputs.version }}. Expected $expectedTag."
          }
      - name: Refuse to overwrite an existing release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $uri = "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}"
          Add-Type -AssemblyName System.Net.Http
          $client = [System.Net.Http.HttpClient]::new()
          $client.DefaultRequestHeaders.Authorization = [System.Net.Http.Headers.AuthenticationHeaderValue]::new("Bearer", $env:GH_TOKEN)
          $client.DefaultRequestHeaders.Accept.ParseAdd("application/vnd.github+json")
          $client.DefaultRequestHeaders.UserAgent.ParseAdd("Project-Graveyard-Release-Workflow")
          $null = $client.DefaultRequestHeaders.TryAddWithoutValidation("X-GitHub-Api-Version", "2022-11-28")
          $response = $client.GetAsync($uri).GetAwaiter().GetResult()
          $statusCode = [int]$response.StatusCode
          $client.Dispose()
          if ($statusCode -eq 200) {
            throw "Release ${{ github.ref_name }} already exists. Refusing to overwrite it."
          }
          if ($statusCode -ne 404) {
            throw "Could not confirm that release ${{ github.ref_name }} is new. GitHub returned HTTP $statusCode."
          }
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run build
      - name: Build Windows installer
        run: npm run dist:win
      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Project-Graveyard-${{ steps.package.outputs.version }}-Windows-x64
          path: release/Project-Graveyard-${{ steps.package.outputs.version }}-x64.exe
          if-no-files-found: error
          retention-days: 14
      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          files: release/Project-Graveyard-${{ steps.package.outputs.version }}-x64.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
