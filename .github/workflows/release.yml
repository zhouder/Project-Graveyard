name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Require the default branch for manual builds
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $expected = "refs/heads/${{ github.event.repository.default_branch }}"
          if ("${{ github.ref }}" -ne $expected) {
            throw "Manual release builds must run from $expected."
          }
      - name: Read package version
        id: package
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - name: Verify tag matches package version
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $expectedTag = "v${{ steps.package.outputs.version }}"
          if ("${{ github.ref_name }}" -ne $expectedTag) {
            throw "Tag ${{ github.ref_name }} does not match package version ${{ steps.package.outputs.version }}. Expected $expectedTag."
          }
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run build
      - name: Build Windows installer
        run: npm run dist:win
      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Project-Graveyard-${{ steps.package.outputs.version }}-Windows-x64
          path: release/Project-Graveyard-${{ steps.package.outputs.version }}-x64.exe
          if-no-files-found: error
          retention-days: 14
      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          files: release/Project-Graveyard-${{ steps.package.outputs.version }}-x64.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
